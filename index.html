<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Étrend">
  <meta name="application-name" content="Étrend">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>Étrend</title>
  <style>
    :root{
      color-scheme: light dark;
      --accent:#1D9E75;
      --bg:#f6f7f6;
      --card:#ffffff;
      --card-soft:#fbfbfa;
      --text:#17201d;
      --muted:#66706b;
      --muted2:#8c9691;
      --border:rgba(20,32,28,.12);
      --shadow:0 1px 2px rgba(0,0,0,.04);
      --warn-bg:#FFF7D6;
      --warn-text:#574200;
      --warn-border:#E8C861;
      --protein-bg:#FAECE7;
      --protein-text:#712B13;
      --carb-bg:#FAEEDA;
      --carb-text:#633806;
      --fat-bg:#EEEDFE;
      --fat-text:#3C3489;
      --dot-protein:#D85A30;
      --dot-carb:#EF9F27;
      --dot-fat:#7F77DD;
      --radius:16px;
      --nav-h:72px;
      --max:760px;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0f1311;
        --card:#171c19;
        --card-soft:#1d231f;
        --text:#eef4f1;
        --muted:#b0bab5;
        --muted2:#7e8a84;
        --border:rgba(238,244,241,.12);
        --shadow:0 1px 2px rgba(0,0,0,.25);
        --warn-bg:#2f270c;
        --warn-text:#FFEBA6;
        --warn-border:#866d1f;
      }
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif; font-weight:400;}
    body{overflow-x:hidden;}
    button,input,select,textarea{font:inherit; color:inherit;}
    input,select,textarea{font-size:16px;}
    button{border:0; background:none; cursor:pointer;}
    .app{min-height:100vh; padding:calc(env(safe-area-inset-top) + 14px) 14px calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px); max-width:var(--max); margin:0 auto;}
    .topbar{position:sticky; top:0; z-index:10; margin:-14px -14px 12px; padding:calc(env(safe-area-inset-top) + 14px) 14px 12px; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:saturate(130%) blur(18px);}
    .app-title{display:flex; align-items:flex-end; justify-content:space-between; gap:12px;}
    h1,h2,h3,p{margin:0;}
    h1{font-size:28px; line-height:1.05; font-weight:500; letter-spacing:-.02em;}
    h2{font-size:22px; line-height:1.15; font-weight:500; letter-spacing:-.015em; margin-bottom:12px;}
    h3{font-size:17px; line-height:1.25; font-weight:500;}
    .subtle{color:var(--muted); font-size:14px; line-height:1.35;}
    .small{font-size:13px; color:var(--muted); line-height:1.35;}
    .section{display:none; animation:fade .14s ease-out;}
    .section.active{display:block;}
    @keyframes fade{from{opacity:.65; transform:translateY(2px)}to{opacity:1; transform:none}}
    .grid{display:grid; gap:12px;}
    .card{background:var(--card); border:0.5px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; overflow:hidden;}
    .card.clickable{min-height:44px; text-align:left; width:100%; display:block;}
    .card.clickable:active{transform:scale(.995);}
    button.card.clickable{border-color:color-mix(in srgb, var(--accent) 18%, var(--border));}
    .row{display:flex; align-items:center; justify-content:space-between; gap:12px;}
    .stack{display:grid; gap:8px;}
    .hero{font-size:34px; line-height:1; font-weight:500; letter-spacing:-.03em; color:var(--text);}
    .hero small{font-size:15px; color:var(--muted); font-weight:400; letter-spacing:0;}
    .chips{display:flex; flex-wrap:wrap; gap:7px;}
    .chip{display:inline-flex; align-items:center; gap:6px; min-height:30px; padding:6px 10px; border-radius:999px; font-size:13px; border:.5px solid var(--border); background:var(--card-soft); white-space:nowrap;}
    .chip.protein{background:var(--protein-bg); color:var(--protein-text); border-color:transparent;}
    .chip.carb{background:var(--carb-bg); color:var(--carb-text); border-color:transparent;}
    .chip.fat{background:var(--fat-bg); color:var(--fat-text); border-color:transparent;}
    .dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex:0 0 7px;}
    .dot.protein{background:var(--dot-protein)} .dot.carb{background:var(--dot-carb)} .dot.fat{background:var(--dot-fat)}
    .macroline{display:flex; gap:10px; flex-wrap:wrap; color:var(--muted); font-size:13px;}
    .macroline span{display:inline-flex; align-items:center; gap:5px;}
    .btn,.pill{min-height:44px; border-radius:999px; padding:10px 14px; border:.5px solid var(--border); background:var(--card); color:var(--text); display:inline-flex; align-items:center; justify-content:center; gap:7px; font-size:15px;}
    .btn.primary,.pill.active{background:var(--accent); color:#fff; border-color:var(--accent);}
    .btn.ghost{background:color-mix(in srgb, var(--accent) 10%, var(--card)); color:var(--accent); border-color:color-mix(in srgb, var(--accent) 42%, var(--border)); font-weight:500;}
    .btn.ghost:active,.btn.ghost:focus-visible{background:color-mix(in srgb, var(--accent) 18%, var(--card));}
    .btn.warn{background:var(--warn-bg); color:var(--warn-text); border-color:var(--warn-border);}
    .backrow{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
    .segment{display:flex; gap:8px; overflow-x:auto; padding:2px 0 10px; margin:0 -1px; scrollbar-width:none;}
    .segment::-webkit-scrollbar{display:none;}
    .warnbox{background:var(--warn-bg); color:var(--warn-text); border:1px solid var(--warn-border); border-radius:14px; padding:12px; line-height:1.45;}
    .warnbox + .warnbox{margin-top:8px;}
    .warnbox .icon{margin-right:6px;}
    details{border:1px solid color-mix(in srgb, var(--accent) 34%, var(--border)); border-radius:14px; background:var(--card); padding:0; overflow:hidden;}
    summary{list-style:none; cursor:pointer; min-height:44px; display:flex; align-items:center; justify-content:space-between; padding:10px 12px; font-weight:500; color:var(--accent); background:color-mix(in srgb, var(--accent) 9%, var(--card));}
    summary::-webkit-details-marker{display:none;}
    summary::after{content:"⌄"; color:var(--accent); font-size:20px; font-weight:500;}
    details[open] summary{border-bottom:.5px solid color-mix(in srgb, var(--accent) 24%, var(--border));}
    details[open] summary::after{transform:rotate(180deg);}
    .details-body{padding:12px; color:var(--muted); line-height:1.45; font-size:15px;}
    .meal-card{scroll-margin-top:120px;}
    .meal-card.highlight{outline:2px solid var(--accent);}
    .ingredients{display:grid; gap:7px; margin-top:8px;}
    .ingredient{display:flex; justify-content:space-between; gap:10px; border-bottom:.5px solid var(--border); padding-bottom:7px; color:var(--muted); font-size:14px; line-height:1.3;}
    .ingredient:last-child{border-bottom:0; padding-bottom:0;}
    .progress{height:9px; background:var(--card-soft); border:.5px solid var(--border); border-radius:999px; overflow:hidden;}
    .progress > span{display:block; height:100%; width:0%; background:var(--accent); border-radius:999px; transition:width .18s ease;}
    .field{width:100%; min-height:44px; border:1px solid color-mix(in srgb, var(--accent) 26%, var(--border)); background:var(--card); border-radius:14px; padding:10px 12px; outline:none;}
    select.field{color:var(--accent); font-weight:500; background:color-mix(in srgb, var(--accent) 8%, var(--card));}
    .field:focus{border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);}
    textarea.field{min-height:130px; resize:vertical; line-height:1.45;}
    .two{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width:390px){.two{grid-template-columns:1fr}.hero{font-size:31px}.app{padding-left:12px; padding-right:12px}.topbar{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}}
    .day-toggle-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(104px,1fr)); gap:8px;}
    .mini-day{min-height:44px; border:.5px solid var(--border); background:var(--card); border-radius:14px; padding:8px; text-align:left; color:var(--text);}
    .mini-day.active{border-color:var(--accent); box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 16%, transparent);}
    .checkitem{display:grid; grid-template-columns:28px 1fr; gap:9px; align-items:start; min-height:44px; padding:9px 0; border-bottom:.5px solid var(--border);}
    .checkitem:last-child{border-bottom:0;}
    .box{width:24px; height:24px; border:.5px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; margin-top:1px; background:var(--card);}
    .checkitem.checked .box{background:var(--accent); border-color:var(--accent);}
    .checkitem.checked .box::after{content:"✓"; font-size:16px; font-weight:500;}
    .checkitem.checked .itemtext{text-decoration:line-through; color:var(--muted2);}
    .quantity{font-weight:500; color:var(--text);}
    .category-title{margin:14px 0 6px; color:var(--muted); font-size:14px; font-weight:500;}
    .searchbar{display:flex; gap:8px; align-items:center; position:sticky; top:74px; z-index:8; background:var(--bg); padding-bottom:10px;}
    .searchbar input{flex:1;}
    .result{display:block; width:100%; text-align:left;}
    .bottomnav{position:fixed; left:0; right:0; bottom:0; z-index:20; height:calc(var(--nav-h) + env(safe-area-inset-bottom)); padding:7px max(8px, env(safe-area-inset-left)) env(safe-area-inset-bottom) max(8px, env(safe-area-inset-right)); background:color-mix(in srgb, var(--card) 92%, transparent); border-top:.5px solid var(--border); backdrop-filter:saturate(150%) blur(18px); display:grid; grid-template-columns:repeat(5,1fr); gap:2px;}
    .navbtn{min-height:56px; border-radius:14px; color:var(--muted2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:11px;}
    .navbtn .ico{font-size:20px; line-height:1;}
    .navbtn.active{color:var(--accent);}
    .empty{padding:22px 12px; text-align:center; color:var(--muted);}
    .source{font-size:12px; color:var(--muted2);}
    .kbd{font-size:12px; border:.5px solid var(--border); border-radius:7px; padding:2px 6px; color:var(--muted);}
  </style>
</head>
<body>

      <div class="app-title">

  <script>
  const APP_VERSION = "20260623000101";
  const APP_DATA = {"title":"4 hetes étrend","subtitle":"refluxbarát · purinszegény · alacsony hisztamintartalmú","purpose_line":"Testsúlycsökkentés és tünetkontroll • éhezés nélküli deficit • kb. 1800 kcal/nap","profile_and_goal":{"profile":"Nő, 37 év, 167 cm, 83 kg, könnyű fizikai aktivitás","goal":"Fenntartható fogyás (kb. 0,3-0,5 kg/hét) + tünetkontroll","estimated_maintenance":"kb. 2000-2100 kcal/nap","target":"kb. 1800 kcal/nap (enyhe, nem megszorító deficit)"},"four_week_average":{"kcal_per_day":"~1778 kcal/nap","protein":"~113 g (25%)","carbohydrate":"~228 g (51%)","fat":"~49 g (24%)","dishes":"Összesen 112 különböző fogás - ismétlés nélkül.","source":"összegzés"},"general_principles":{"reflux":"Nincs paradicsom, citrus, csípős/erős fűszer, csokoládé, kávé, alkohol, zsírban sült étel. A vacsora minden nap könnyebb, mint az ebéd; lágy elkészítés.","uric_acid":"Purinszegény: nincs belsőség, hal, tenger gyümölcse, húsleves-koncentrátum. Sovány, friss hús mértékkel; a fehérje nagy része tejtermékből.","histamine":"Legszigorúbb szemlélet: csak frissen készített vagy frissen fagyasztott alapanyag, semmi maradék. Nincs érlelt sajt, füstölt hús, konzerv, savanyúság, ecet, fermentált étel, joghurt."},"food_rules":{"fully_omitted":["Paradicsom","citrusfélék","csokoládé","kávé","banán","eper","diófélék","tojás","gomba","halak","tenger gyümölcsei","belsőségek","alkohol"],"avoided_or_minimized":["Füstölt és feldolgozott húsok","érlelt sajtok","konzervek","savanyúságok","ecetes és fermentált ételek","szójaszósz","leveskocka","hosszan tárolt maradék","bő olajban sült étel"],"freshness_key":"Hús, baromfi és tejtermék mindig friss vagy frissen fagyasztott legyen, és aznap készüljön el. Maradékot ne tegyél el másnapra; inkább nyersen porciózva fagyaszd."},"general_tips":{"drinks":"Italok: napi 2-2,5 l víz; kávé és fekete/zöld tea helyett rooibos vagy enyhe gyógytea. Citruslé és alkohol nélkül.","timing":"Időzítés: a vacsora legyen lefekvés előtt legalább 2,5-3 órával, és maradjon kisebb, mint az ebéd.","preparation":"Elkészítés: párolás, főzés, kevés olajon sütés vagy sütőben sütés - kerüld a bő olajban rántást. Fűszerek: friss zöldfűszerek (petrezselyem, kapor, snidling, bazsalikom), só mértékkel; csípős és erős fűszer nélkül.","freshness":"Frissesség = kulcs: a hisztamin miatt aznap főzz, és ne tárolj maradékot. Ha előre dolgoznál, nyersen porciózva fagyaszd, és csak a felhasználás napján süsd ki.","movement":"Mozgás: könnyű aktivitás (napi 30-40 perc séta) gyorsítja a fogyást és segíti a húgysav-ürítést."},"weeks":[{"week_index":1,"summary":{"average_per_day":{"kcal":1777,"protein_g":114,"carbohydrate_g":232,"fat_g":46,"source":"összegzés"},"focus":"klasszikus köretek, friss tejtermékek, könnyű vacsorák","new_items":"Zabkása, rizs, köles, hajdina, bulgur, burgonya; alma, körte, áfonya.","watch_points":["Joghurt nincs: az áfonyás uzsonna friss ricottakrémmel készül.","Friss gomolya és ricotta: aznap fogyasztva a legjobb; a napokig állót kerüld.","Friss kenyér/zsemle: ha nem tolerálod, cseréld rizsre, burgonyára vagy élesztőmentes lepényre.","Kaliforniai paprika, cékla, szőlő és áfonya: kis adaggal teszteld az egyéni toleranciát.","Sütőtök marad; spenót és padlizsán szándékosan nincs benne.","A húsokat nyersen porciózva fagyaszd, és csak a felhasználás napján készítsd el."]},"measurement_note":"Az adagok grammban értendők. A húsoknál a megadott súly nyers, a gabonáknál száraz tömeg. Az olívaolaj a sütéshez/ízesítéshez számolva.","days":[{"day_index":1,"weekday":"Hétfő","daily_total":{"kcal":1760,"protein_g":120,"carbohydrate_g":238,"fat_g":38,"source":"összegzés"},"meals":[{"type":"Reggeli","name":"Almás zabkása","nutrition":{"kcal":449,"protein_g":16,"carbohydrate_g":78,"fat_g":8,"source":"étkezéssor"},"ingredients_raw":"zabpehely 70 g (szárazon), friss tej (1,5%) 200 g, alma 130 g, méz 10 g","ingredients":[{"raw":"zabpehely 70 g (szárazon)","name":"zabpehely","quantity":70,"unit":"g","note":"szárazon","status":"parsed"},{"raw":"friss   function norm(s){ return String(s||'').trim().toLocaleLowerCase('hu-HU').replace(/\s+/g,' '); }
  function fmtNum(n){ if(n === null || n === undefined || n === '') return ''; const x = Number(n); if(!Number.isFinite(x)) return String(n); return Math.round(x*10)/10 === Math.round(x) ? String(Math.round(x)) : String(Math.round(x*10)/10).replace('.', ','); }
  function fmtQty(q,u){ return `${fmtNum(q)} ${esc(u || '')}`.trim(); }
  function totalChips(total){

  function dlToL(dl){ return (Number(dl)||0) / 10; }

  function renderWater(wi,di){
    const v = LS.get(waterKey(wi,di), {amountDl:0, goalDl:25, glassDl:2.5});
    const amountDl = Number(v.amountDl)||0, goalDl = Number(v.goalDl)||25, glassDl = Number(v.glassDl)||2.5;

    return `<div class="card stack" id="waterCard">
      <div class="row"><h3>vízfogyasztás</h3><div class="hero">${fmtLFromDl(amountDl)} <small>l</small></div></div>

  function bindWater(wi,di){
    const card = $('#waterCard'); if(!card) return;
    const get = () => LS.get(waterKey(wi,di), {amountDl:0, goalDl:25, glassDl:2.5});
    const save = (v) => { v.amountDl = Math.max(0, Math.round((Number(v.amountDl)||0)*10)/10); v.goalDl = Math.max(1, Number(v.goalDl)||25); v.glassDl = Math.max(.5, Number(v.glassDl)||2.5); LS.set(waterKey(wi,di), v); renderDay($('#view-diet'),wi,di); };
    $$('[data-water]', card).forEach(b => b.addEventListener('click', () => { const v=get(); const g=Number(v.glassDl)||2.5; v.amountDl += b.dataset.water === 'plus' ? g : -g; save(v); }));
    $('#waterGoal', card)?.addEventListener('change', e => { const v=get(); v.goalDl = lToDl(String(e.target.value).replace(',','.')); save(v); });
    $('#waterGlass', card)?.addEventListener('change', e => { const v=get(); v.glassDl = String(e.target.value).replace(',','.'); save(v); });
  }
  function renderNote(wi,di){ const v = LS.get(noteKey(wi,di), ''); return `<div class="card stack"><h3>napi jegyzet</h3><textarea class="field" id="dayNote" placeholder="írj ide saját megjegyzést...">${esc(v)}</textarea></div>`; }

  function segBtn(mode,label){ return `<button class="pill ${state.shoppingMode===mode?'active':''}" data-shop-mode="${mode}">${label}</button>`; }
  function shoppingControls(){
    if(state.shoppingMode === 'week') return `<label class="small">hét<select class="field" id="shopWeek">${APP_DATA.weeks.map(w=>`<option value="${w.week_index}" ${state.shoppingWeek===w.week_index?'selected':''}>${w.week_index}. hét</option>`).join('')}</select></label>`;

    return `<p class="small">válaszd ki az összevonandó napokat</p><div class="day-toggle-grid">${allDays().map(({week:w,day:d}) => { const key=`${w.week_index}-${d.day_index}`; const on=state.customDays.includes(key); return `<button class="mini-day ${on?'active':''}" data-custom-day="${key}"><span class="small">${w.week_index}. hét</span><br>${d.day_index}. nap · ${WEEKDAYS_SHORT[d.day_index-1] || d.weekday}</button>`; }).join('')}</div>`;

  function bindShoppingControls(currentList){

  function categoryMap(){
    const map = new Map();
    APP_DATA.weeks.forEach(w => Object.entries(w.shopping_list?.categories || {}).forEach(([cat,items]) => items.forEach(it => map.set(norm(it.name), cat))));
    return map;
  }
  const CATMAP = categoryMap();
  function buildShoppingList(){
    if(state.shoppingMode === 'week'){
      const w = week(state.shoppingWeek);
      const categories = {};
      Object.entries(w.shopping_list?.categories || {}).forEach(([cat,items]) => categories[cat] = items.map(it => ({name:it.name, qty:it.quantity, unit:it.unit, raw:it.raw, note:it.note, status:it.status})));
      return {title:`${state.shoppingWeek}. hét · heti lista`, note:(w.shopping_list?.notes||[]).join(' '), categories, source:'weekly_list'};
    }
    let selected = [];
    if(state.shoppingMode === 'day') selected = [{weekIndex:state.shoppingDayWeek, dayIndex:state.shoppingDay}];
    if(state.shoppingMode === 'custom') selected = state.customDays.map(k => { const [w,d]=k.split('-').map(Number); return {weekIndex:w, dayIndex:d}; });
    const items = [];
    selected.forEach(sel => {
      const d = day(sel.weekIndex, sel.dayIndex);
      d?.meals?.forEach(m => (m.ingredients || []).forEach(it => items.push({...it, weekIndex:sel.weekIndex, dayIndex:sel.dayIndex, meal:m.name})));
    });
    const ag = aggregateItems(items);
    const categories = {};
    ag.forEach(it => { const cat = CATMAP.get(norm(it.name)) || 'Egyéb'; (categories[cat] ||= []).push(it); });
    const title = state.shoppingMode === 'day' ? `${state.shoppingDayWeek}. hét · ${state.shoppingDay}. nap hozzávalói` : `${selected.length} kiválasztott nap összevonva`;
    const note = state.shoppingMode === 'custom' && !selected.length ? 'még nincs kiválasztott nap' : 'az azonos és kompatibilis mértékegységű tételek összevonva';
    return {title, note, categories, source:'calculated_days'};
  }
  function unitClass(u){ u=norm(u); if(['g','kg','mg'].includes(u)) return 'weight'; if(['ml','dl','l'].includes(u)) return 'volume'; return u || 'missing'; }
  function toBase(q,u){ q=Number(q); u=norm(u); if(!Number.isFinite(q)) return null; if(u==='kg') return q*1000; if(u==='mg') return q/1000; if(u==='g') return q; if(u==='l') return q*1000; if(u==='dl') return q*100; if(u==='ml') return q; return q; }
  function fromBase(q,cls){
    if(cls==='weight') return q >= 1000 ? {qty:Math.round(q/100)/10, unit:'kg'} : {qty:Math.round(q), unit:'g'};
    if(cls==='volume') return q >= 1000 ? {qty:Math.round(q/100)/10, unit:'l'} : {qty:Math.round(q), unit:'ml'};
    return {qty:q, unit:cls};
  }
  function aggregateItems(items){
    const grouped = new Map(), singles=[];
    items.forEach((it,idx) => {
      if(it.quantity === null || it.quantity === undefined || !it.unit || it.status !== 'parsed') { singles.push({name:it.name || it.raw, qty:null, unit:null, raw:it.raw, status:it.status || 'missing', single:true}); return; }
      const cls = unitClass(it.unit); const base = toBase(it.quantity,it.unit);
      if(base === null || cls==='missing') { singles.push({name:it.name || it.raw, qty:it.quantity, unit:it.unit, raw:it.raw, status:'unclear', single:true}); return; }
      const key = `${norm(it.name)}|${cls}`;
      const g = grouped.get(key) || {name:it.name, base:0, cls, notes:new Set(), raws:[]};
      g.base += base; if(it.note) g.notes.add(it.note); g.raws.push(it.raw); grouped.set(key,g);
    });
    const out = Array.from(grouped.values()).map(g => { const f=fromBase(g.base,g.cls); return {name:g.name, qty:f.qty, unit:f.unit, note:Array.from(g.notes).join(', ') || null, raw:g.raws.join(' + '), status:'parsed'}; });
    return out.concat(singles).sort((a,b)=>norm(a.name).localeCompare(norm(b.name),'hu'));
  }
  function renderShoppingItems(list){
    const keys=[];
    const html = Object.entries(list.categories || {}).filter(([c,items]) => items.length).map(([cat,items]) => `<div><div class="category-title">${esc(cat)}</div>${items.map(it => {
      const q = it.qty !== null && it.qty !== undefined ? fmtQty(it.qty,it.unit) : esc(it.raw || 'mennyiség nélkül');
      const key = `check:${list.source}:${list.title}:${cat}:${norm(it.name)}:${q}`; keys.push(key);
      const checked = LS.get(key,false);
      return `<div class="checkitem ${checked?'checked':''}" data-check-key="${esc(key)}"><span class="box"></span><div class="itemtext"><div class="row"><span>${esc(it.name)}</span><span class="quantity">${q}</span></div>${it.note ? `<p class="small">${esc(it.note)}</p>` : ''}</div></div>`;
    }).join('')}</div>`).join('');
    list.keys = keys;
    return html || `<div class="empty">nincs megjeleníthető tétel</div>`;
  }

      </div>
      <div class="card stack"><h3>a hét étkezései</h3>${w.days.map(d=>`<div class="stack"><h3>${d.day_index}. nap (${esc(d.weekday)})</h3>${d.meals.map((m,i)=>`<button class="card clickable" onclick="switchTab('diet',{noScroll:true}); openDay(${w.week_index},${d.day_index},${i})"><div class="row"><span>${esc(m.type)} · ${esc(m.name)}</span><span>${fmtNum(m.nutrition?.kcal)} kcal</span></div>${mealMacroLine(m.nutrition)}</button>`).join('')}</div>`).join('')}</div>
      <div class="card stack"><h3>heti figyelmeztetések és szabályok</h3>${(w.summary?.watch_points||[]).map(x=>`<div class="warnbox"><span class="icon">⚠</span>${esc(x)}</div>`).join('')}${w.days.flatMap(d=>d.warnings||[]).map(x=>`<div class="warnbox"><span class="icon">⚠</span>${esc(x)}</div>`).join('') || ''}</div>
    </div>`;
    $('#summaryWeek')?.addEventListener('change', e => { state.summaryWeek=Number(e.target.value); renderSummary(); });
  }

  function buildSearchIndex(){
    const idx=[];
    APP_DATA.weeks.forEach(w => {
      idx.push({kind:'hét', title:`${w.week_index}. hét`, meta:w.summary?.focus || '', text:`${w.week_index}. hét ${w.summary?.focus} ${w.summary?.new_items} ${(w.summary?.watch_points||[]).join(' ')}`, action:()=>{switchTab('diet',{noScroll:true}); openWeek(w.week_index);}});
      w.days.forEach(d => {
        idx.push({kind:'nap', title:`${w.week_index}. hét · ${d.day_index}. nap (${d.weekday})`, meta:`${d.daily_total?.kcal} kcal`, text:`${w.week_index}. hét ${d.day_index}. nap ${d.weekday} ${d.why_good} ${(d.warnings||[]).join(' ')}`, action:()=>{switchTab('diet',{noScroll:true}); openDay(w.week_index,d.day_index);}});
        d.meals.forEach((m,i) => idx.push({kind:m.type, title:m.name, meta:`${w.week_index}. hét · ${d.day_index}. nap · ${m.nutrition?.kcal} kcal`, text:`${m.type} ${m.name} ${m.ingredients_raw} ${(m.ingredients||[]).map(x=>x.raw).join(' ')} ${m.preparation}`, action:()=>{switchTab('diet',{noScroll:true}); openDay(w.week_index,d.day_index,i);}}));
      });
      Object.entries(w.shopping_list?.categories || {}).forEach(([cat,items]) => items.forEach(it => idx.push({kind:'bevásárlólista', title:it.name, meta:`${w.week_index}. hét · ${cat} · ${fmtQty(it.quantity,it.unit)}`, text:`${it.name} ${it.raw} ${cat}`, action:()=>{state.shoppingWeek=w.week_index; state.shoppingMode='week'; switchTab('shopping');}})));
    });
    const gp=APP_DATA.general_principles||{}, fr=APP_DATA.food_rules||{}, tips=APP_DATA.general_tips||{};
    Object.entries(gp).forEach(([k,v])=>idx.push({kind:'szabály', title:labelRule(k), meta:'közös elvek', text:v, action:()=>switchTab('rules')}));
    [...(fr.fully_omitted||[]),...(fr.avoided_or_minimized||[]),fr.freshness_key,...Object.values(tips)].filter(Boolean).forEach(v=>idx.push({kind:'szabály', title:String(v).slice(0,60), meta:'szabályok', text:v, action:()=>switchTab('rules')}));
    return idx;
  }
  let SEARCH_INDEX = null;
  function renderSearch(){
    setSubtitle('globális keresés');
    if(!SEARCH_INDEX) SEARCH_INDEX = buildSearchIndex();
    const q = state.searchQuery || '';
    const qn = norm(q);
    const hits = !qn ? [] : SEARCH_INDEX.filter(x => norm(`${x.title} ${x.meta} ${x.text}`).includes(qn)).slice(0,80);
    $('#view-search').innerHTML = `<div class="grid">
      <div class="searchbar"><input class="field" id="searchInput" placeholder="étel, alapanyag, nap, szabály..." value="${esc(q)}"><button class="btn" id="clearSearch">törlés</button></div>
      <div class="grid" id="searchResults">${!qn ? `<div class="empty">írj be egy keresőkifejezést</div>` : hits.length ? hits.map((h,i)=>`<button class="card result stack" data-hit="${i}"><div class="row"><h3>${esc(h.title)}</h3><span class="chip">${esc(h.kind)}</span></div><p class="subtle">${esc(h.meta)}</p></button>`).join('') : `<div class="empty">nincs találat</div>`}</div>
    </div>`;
    $('#searchInput')?.addEventListener('input', e => { state.searchQuery=e.target.value; renderSearch(); setTimeout(()=>$('#searchInput')?.focus(),0); });
    $('#clearSearch')?.addEventListener('click', () => { state.searchQuery=''; renderSearch(); });
    $$('[data-hit]').forEach(b => b.addEventListener('click', () => hits[Number(b.dataset.hit)]?.action()));
    if(q) setTimeout(()=>{ const input=$('#searchInput'); input?.focus(); input?.setSelectionRange(input.value.length,input.value.length); },0);
  }

  function boot(){
    $$('.navbtn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
    const last = LS.get('lastView', null);
    if(last?.level === 'day') { state.dietLevel='day'; state.weekIndex=last.weekIndex || 1; state.dayIndex=last.dayIndex || 1; }
    else if(last?.level === 'week') { state.dietLevel='week'; state.weekIndex=last.weekIndex || 1; }
    else state.dietLevel='weeks';
    renderDiet({noScroll:true});
    if('serviceWorker' in navigator){ window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(()=>{})); }
  }
  boot();
  </script>
</body>
</html>
